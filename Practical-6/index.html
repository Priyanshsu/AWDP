<!DOCTYPE html>
<html>
<head>
  <title>Practical 6 - Event Handling</title>
  <style>
    #box { width:150px; height:150px; background:lightblue;
           text-align:center; line-height:150px; font-size:18px; margin:20px; }
  </style>
</head>
<body>
  <h2>JavaScript Event Handling</h2>

  <!-- onclick -->
  <button onclick="alert('Button Clicked!')">Click Me</button>

  <!-- onmouseover / onmouseout -->
  <div id="box"
    onmouseover="this.style.background='orange'; this.innerText='Mouse Over!'"
    onmouseout="this.style.background='lightblue'; this.innerText='Hover Me'">
    Hover Me
  </div>

  <!-- onkeyup -->
  <p>Type something: <input type="text" onkeyup="showInput(this.value)"></p>
  <p>You typed: <span id="typed"></span></p>

  <!-- onchange -->
  <p>Select color:
    <select onchange="document.body.style.background = this.value">
      <option value="white">White</option>
      <option value="lightyellow">Yellow</option>
      <option value="lightgreen">Green</option>
      <option value="lightpink">Pink</option>
    </select>
  </p>

  <!-- ondblclick -->
  <p ondblclick="this.style.color='red'">Double-click this text to turn red!</p>

  <script>
    function showInput(val) {
      document.getElementById("typed").innerText = val;
    }
  </script>
</body>
</html>
