<!DOCTYPE html>
<html>
<head>
  <title>Practical 3 - Box Model</title>
  <style>
    body { background-color: #d3d3d3; font-family: Arial; }

    .container {
      width: 600px;
      margin: 30px auto;
      background-color: #a9a9a9;
      padding: 20px;
      border: 3px solid #555;
    }

    .box {
      background-color: #808080;
      width: 200px;
      height: 100px;
      margin: 15px;
      padding: 10px;
      border: 2px solid #333;
      display: inline-block;
    }

    .box:hover { background-color: #696969; }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="color:white;">Box Model Layout</h2>
    <div class="box"><p style="color:white;">Box 1<br>margin/padding demo</p></div>
    <div class="box"><p style="color:white;">Box 2<br>margin/padding demo</p></div>
    <div class="box"><p style="color:white;">Box 3<br>margin/padding demo</p></div>
  </div>
</body>
</html>
